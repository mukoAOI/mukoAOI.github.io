baseURL = "https://mukoAOI.github.io/"
theme = "introduction"
title = "mukoAOI"
defaultContentLanguage = "zh-cn"
enableRobotsTXT = true

[taxonomies]
  tag = "tags"
  series = "series"

[params]
  themeStyle = "auto"
  favicon = "/img/fav.ico"
  showMenu = true
  showRSSButton = true
  fadeIn = true
  fadeInIndex = false
  dateFormat = "2006年1月2日"
  email = ""

  [params.home]
    introHeight = "large"
    showLatest = true
    showAllPosts = false
    allPostsArchiveFormat = true
    numberOfProjectsToShow = 3
    localTime = true
    timeZone = "Asia/Shanghai"
    timeFormat = "zh-CN"

  [params.projects]
    useTwoColumns = false

  [params.share]
    twitter = true
    facebook = false
    pinterest = false

  [[params.social]]
    url = "https://github.com/mukoAOI"
    icon = "github"
    icon_pack = "fab"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNoStart = 1
    lineNos = false
    style = "github"
    tabWidth = 4

[languages]
  [languages.zh-cn]
    label = "简体中文"
    locale = "zh-CN"
    contentDir = "content"
    weight = 0
    title = "mukoAOI"
    [languages.zh-cn.params]
      description = "mukoAOI 的个人站点 · Hugo Introduction 主题"
