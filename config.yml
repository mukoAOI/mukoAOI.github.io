baseURL: https://mukoAOI.github.io/
theme: terminalcv
title: mukoAOI
enableRobotsTXT: true

params:
  version: "1.0.0"
  description: mukoAOI 的在线终端风格主页
  blog:
    enabled: true
    lsClassic: false
  prompt:
    core:
      text: visitor@github.io
      color: green
      before: "["
      beforeColor: cyan
      after: "]"
      afterColor: cyan
    separator:
      text: "-"
    path:
      before: "["
      beforeColor: cyan
      text: "~/mukoAOI"
      color: blue
      after: "]"
      afterColor: cyan
    extra:
      text: ": "
      color: orange

  listLS: true
  exitMessage: "[会话结束，可以安全关闭窗口]"
  source: true

  greetingbannercolor: cyan
  greetingbanner: |
    ███╗   ███╗██╗   ██╗██╗  ██╗ ██████╗      █████╗  ██████╗ ██╗
    ████╗ ████║██║   ██║██║ ██╔╝██╔═══██╗    ██╔══██╗██╔═══██╗██║
    ██╔████╔██║██║   ██║█████╔╝ ██║   ██║    ███████║██║   ██║██║
    ██║╚██╔╝██║██║   ██║██╔═██╗ ██║   ██║    ██╔══██║██║   ██║██║
    ██║ ╚═╝ ██║╚██████╔╝██║  ██╗╚██████╔╝    ██║  ██║╚██████╔╝██║
    ╚═╝     ╚═╝ ╚═════╝ ╚═╝  ╚═╝ ╚═════╝     ╚═╝  ╚═╝ ╚═════╝ ╚═╝

  greeting: |
    欢迎访问终端风格主页（Hugo + terminalCV）。

    输入 help 查看命令列表；若已开启博客，可用 posts / ls 列出文章，cat <文章名> 阅读全文。

  whois:
    details:
      leftColor: white
      rightColor: white
      descriptionColor: white
      name: mukoAOI
      profession: Developer
      location: 中国
      email: ""
      homelink: https://mukoAOI.github.io
      description: |
        站点源码与部署流水线在 GitHub，按需自行修改 config.yml 与 content/posts。

  social:
    details:
      - name: github
        url: https://github.com/mukoAOI

  work:
    details:
      - jobTitle: 示例岗位
        company: "-"
        location: 远程
        date: 2026 - 至今
        description: 在 config.yml 的 work.details 中填写你的经历。

  education:
    details:
      - courseName: 示例教育经历
        date: 2020 - 2024
        description: 在 config.yml 的 education.details 中替换为真实信息。

  skills:
    details:
      - name: Hugo
        percentage: 70
        description: 静态站点与 GitHub Pages
      - name: Git
        percentage: 75
        description: 版本管理与协作

  softskills:
    details:
      - name: 学习
        percentage: 90
        description: 持续更新技能树

  languages:
    details:
      - name: 简体中文
        percentage: 100
      - name: English
        percentage: 60
        description: 读写与工作邮件

  projects:
    details:
      - title: mukoAOI.github.io
        color: green
        date: 2026 起
        link: https://github.com/mukoAOI/mukoAOI.github.io
        description: 本站点与 GitHub Pages 部署

  publications:
    details: []

  certifications:
    details: []

  misc:
    title: 提示
    titleColor: teal
    content: |
      主题文档与示例：仓库内 exampleSite/config.yml。
      自定义配色可在 static/style.css，并在本文件中设置 customCSS: true。
    contentColor: orange
