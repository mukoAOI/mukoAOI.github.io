baseURL: https://mukoAOI.github.io/
defaultContentLanguage: zh-cn
title: mukoAOI
theme: PaperMod

enableEmoji: true
enableRobotsTXT: true
pygmentsUseClasses: true
mainsections: [posts]

pagination:
  pagerSize: 10

minify:
  disableXML: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

languages:
  zh-cn:
    label: 简体中文
    weight: 1
    locale: zh-CN
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: 首页
          url: /
          weight: 5
        - name: 归档
          url: archives/
          weight: 10
        - name: 搜索
          url: search/
          weight: 15
        - name: 标签
          url: tags/
          weight: 20

params:
  env: production
  description: mukoAOI 的个人站点
  author: mukoAOI
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowPageNums: true

  homeInfoParams:
    Title: 你好，欢迎来访 👋
    Content: >
      这是 **mukoAOI** 的个人站点，使用 [Hugo](https://gohugo.io/) 与 [PaperMod](https://github.com/adityatelange/hugo-PaperMod)。

      源码与部署在 [GitHub Pages](https://github.com/mukoAOI/mukoAOI.github.io)，推送到 `main` 分支后会自动构建发布。

  socialIcons:
    - name: github
      title: GitHub
      url: https://github.com/mukoAOI

  editPost:
    URL: https://github.com/mukoAOI/mukoAOI.github.io/tree/main/content
    Text: 在 GitHub 上编辑
    appendFilePath: true

  assets:
    disableHLJS: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
